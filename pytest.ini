[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["apps/mock-platform-server", "packages/shared-config", "packages/shared-db", "packages/domain-models", "packages/provider-sdk"]

[tool.coverage.run]
source = ["apps/mock-platform-server"]
omit = ["*/tests/*", "*/migrations/*"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:"
]